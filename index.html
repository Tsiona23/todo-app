<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoo · Dashboard</title> 
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <i class="fas fa-pen brand-icon"></i>
        <span>ToDoo</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link active"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="tasks.html" class="nav-link"><i class="fas fa-list-check"></i> <span>All Tasks</span></a>
        <a href="tasks.html?filter=completed" class="nav-link"><i class="fas fa-check-circle"></i> <span>Completed</span></a>
        <a href="tasks.html?filter=important" class="nav-link"><i class="fas fa-star"></i> <span>Important</span></a>
        <a href="#" class="nav-link" id="settingsLink"><i class="fas fa-cog"></i> <span>Settings</span></a>
      </nav>
    </aside>
 
    <!-- Main content -->
    <main class="main-content">
      <!-- Header -->
      <header class="main-header">
        <div class="header-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu"><i class="fas fa-bars"></i></button>
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Search..." />
          </div>
          <button class="icon-btn" id="notificationBtn" aria-label="View notifications"><i class="fas fa-bell"></i></button>
          <button class="icon-btn" id="themeToggleHeader" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
          <button class="btn-primary add-task-btn" id="addTaskBtn"><i class="fas fa-plus"></i> Add Task</button>
        </div>
      </header>
 
      <!-- Dashboard content -->
      <section class="dashboard-content">
        <!-- Welcome + date -->
        <div class="welcome-section">
          <div>
            <h2 id="greeting">Good Morning 👋</h2>
            <p class="date-display" id="currentDate">Ready to complete your goals today?</p>
          </div>
          <div class="streak-badge">
            <i class="fas fa-fire"></i> <span id="streakCount">0</span> day streak
          </div>
        </div>
 
        <!-- Stats cards -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-icon total"><i class="fas fa-tasks"></i></div><div class="stat-info"><h3>Total Tasks</h3><p id="statTotal">0</p></div></div>
          <div class="stat-card"><div class="stat-icon completed"><i class="fas fa-check-double"></i></div><div class="stat-info"><h3>Completed</h3><p id="statCompleted">0</p></div></div>
          <div class="stat-card"><div class="stat-icon pending"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>Pending</h3><p id="statPending">0</p></div></div>
          <div class="stat-card"><div class="stat-icon productivity"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>Productivity</h3><p id="statProductivity">0%</p></div></div>
        </div>
 
        <!-- Chart + insights -->
        <div class="chart-insight-row">
          <div class="chart-container">
            <canvas id="dashboardChart"></canvas>
          </div>
          <div class="insight-container" id="insightContainer">
            <h4>⚡ Productivity Insights</h4>
            <p id="insightText">You're on fire! Keep going.</p>
          </div>
        </div>
 
        <!-- Recent tasks -->
        <div class="recent-tasks">
          <div class="section-header">
            <h3>📌 Recent Tasks</h3>
            <a href="tasks.html" class="view-all-btn">View All <i class="fas fa-arrow-right"></i></a>
          </div>
          <div id="recentTaskList" class="task-list"></div>
        </div>
      </section>
    </main>
  </div>
 
  <!-- Add/Edit Task Modal (reused) -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Task</h3>
        <button class="close-modal" id="closeModalBtn" aria-label="Close modal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="taskForm">
          <input type="hidden" id="taskEditId" />
          <div class="form-group"> 
            <label for="taskTitle">Title *</label>
            <input type="text" id="taskTitle" placeholder="Write a task..." required />
          </div>
          <div class="form-group"> 
            <label for="taskDesc">Description</label>
            <textarea id="taskDesc" rows="2" placeholder="Add details..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="taskCategory">Category</label>
              <select id="taskCategory"><option value="Work">Work</option><option value="Personal">Personal</option><option value="Shopping">Shopping</option><option value="Study">Study</option><option value="Other">Other</option></select>
            </div>
            <div class="form-group">
              <label for="taskPriority">Priority</label>
              <select id="taskPriority"><option value="Low">Low</option><option value="Medium" selected>Medium</option><option value="High">High</option></select>
            </div>
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate" />
          </div>
          <div class="form-actions">
            <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary" id="saveTaskBtn"><i class="fas fa-plus"></i> Add Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>
 
  <!-- Toast container -->
  <div id="toastContainer"></div>
 
  <script src="scripts/app.js"></script>
</body>
</html>
